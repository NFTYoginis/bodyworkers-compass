# Cloudflare Worker — live no-signup surface for Bodyworker's Compass.
# Fetches the instruction layer (identity/rules/examples/reference) from the PUBLIC
# repo raw URLs as the system prompt, then proxies a single chat turn to the
# Anthropic Messages API (Sonnet 4.6). The API key is NEVER committed — it is set
# once with `wrangler secret put ANTHROPIC_API_KEY`. See README.md for setup.

name = "bodyworkers-compass"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Non-secret config. Override REPO_RAW here if the public repo is renamed at deploy
# (buyer-outcome rename) so the Worker keeps reading the right instruction files.
[vars]
REPO_RAW = "https://raw.githubusercontent.com/NFTYoginis/bodyworkers-compass/main"
PAGES_BASE = "https://nftyoginis.github.io/bodyworkers-compass"
MODEL = "claude-sonnet-4-6"
MAX_TOKENS = "1024"

# LIVE-DEMO-PROBE guardrail: per-IP rate limiting via the first-class [[ratelimits]]
# table. The older [[unsafe.bindings]] type="ratelimit" form deploys as inert "Unsafe
# Metadata" and does NOT enforce — verified with a 16-request burst that saw zero 429s.
# 10 requests / 60s per client IP. src/index.js still falls back to an in-isolate
# limiter if the binding is ever absent.
[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"

[ratelimits.simple]
limit = 10
period = 60
